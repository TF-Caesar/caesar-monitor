name: caesar-monitor

on:
  schedule:
    - cron: '17 7 * * *' # daily, 07:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Check watches and report what's new
        id: check
        env:
          # Optional: set CAESAR_SEARCH_API_KEY as a repo secret for higher
          # rate limits. Without it, this runs on Caesar's free anonymous tier.
          CAESAR_SEARCH_API_KEY: ${{ secrets.CAESAR_SEARCH_API_KEY }}
        run: |
          {
            echo '## caesar-monitor — what is new'
            echo ''
            echo '```'
            node dist/cli.js check 2>&1 | tee /tmp/monitor.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit updated state
        run: |
          git config user.name  'caesar-monitor[bot]'
          git config user.email 'caesar-monitor@users.noreply.github.com'
          # state.json is gitignored for local dev, so force-add the bot's state.
          # Guard on existence so the step never fails if the dir is somehow absent.
          if [ -d .caesar-monitor ]; then git add -f .caesar-monitor; fi
          if git diff --cached --quiet; then
            echo 'No state changes to commit.'
          else
            git commit -m 'chore: update caesar-monitor state'
            git push
          fi
